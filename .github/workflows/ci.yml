name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Lint, Tests, Build, and Supabase Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.20.3

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Run Edge Function Deno tests
        run: npm run test:functions

      - name: Run local Supabase integration and database tests
        run: npm run test:supabase

      - name: Build web app
        run: npm run build:web

      - name: Check issue-session function
        run: deno check --no-lock supabase/functions/issue-session/index.ts

      - name: Check complete-quiz function
        run: deno check --no-lock supabase/functions/complete-quiz/index.ts
