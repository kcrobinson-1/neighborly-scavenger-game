name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Lint, Tests, Build, and Supabase Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.20.3

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Run Edge Function Deno tests
        run: npm run test:functions

      - name: Run local Supabase integration and database tests
        run: npm run test:supabase

      - name: Run attendee trusted-backend Playwright smoke tests
        run: npm run test:e2e:attendee:trusted-backend

      - name: Build web app
        run: npm run build:web

      - name: Check issue-session function
        run: deno check --no-lock supabase/functions/issue-session/index.ts

      - name: Check complete-quiz function
        run: deno check --no-lock supabase/functions/complete-quiz/index.ts

      - name: Check save-draft function
        run: deno check --no-lock supabase/functions/save-draft/index.ts

      - name: Check publish-draft function
        run: deno check --no-lock supabase/functions/publish-draft/index.ts

      - name: Check unpublish-event function
        run: deno check --no-lock supabase/functions/unpublish-event/index.ts

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: tmp/playwright/test-results*
