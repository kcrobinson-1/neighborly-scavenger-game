name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync-supabase-production:
    name: Sync Supabase Production
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'
      )
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.20.3

      - name: Validate release secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_REF"

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF" --use-api
