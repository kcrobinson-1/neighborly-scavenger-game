name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Lint, Tests, Build, DB, and Edge Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Run database tests
        run: npm run test:db

      - name: Build web app
        run: npm run build:web

      - name: Check issue-session function
        run: deno check --no-lock supabase/functions/issue-session/index.ts

      - name: Check complete-quiz function
        run: deno check --no-lock supabase/functions/complete-quiz/index.ts
